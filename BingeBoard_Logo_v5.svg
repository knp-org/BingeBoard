<svg viewBox="0 0 108 108" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Cyan/Blue (Left Vertical) -->
        <linearGradient id="leftGrad" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#118AB2" />
            <stop offset="100%" stop-color="#9B5DE5" />
        </linearGradient>

        <!-- Pink/Orange (Top Slant) -->
        <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#F15BB5" />
            <stop offset="100%" stop-color="#FB5607" />
        </linearGradient>

        <!-- Yellow/Mint (Bottom Slant) -->
        <linearGradient id="bottomGrad" x1="100%" y1="100%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#FFBE0B" />
            <stop offset="100%" stop-color="#06D6A0" />
        </linearGradient>

        <!-- Gloss/Glow Effects -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.4" />
        </filter>

        <!-- Clip to draw the final interlocking knot piece -->
        <clipPath id="interlock">
            <rect x="0" y="0" width="38" height="108" />
        </clipPath>
    </defs>

    <g transform="translate(0, 0)">
        <!-- 1. Top Diagonal (Under everything at left, over at right) -->
        <line x1="30" y1="24" x2="78" y2="54" stroke="url(#topGrad)" stroke-width="16"
            stroke-linecap="round" filter="url(#glow)" />

        <!-- 2. Bottom Diagonal (Over Top at right, Under Left at left) -->
        <line x1="78" y1="54" x2="30" y2="84" stroke="url(#bottomGrad)" stroke-width="16"
            stroke-linecap="round" filter="url(#glow)" />

        <!-- 3. Left Vertical (Over Bottom at bottom-left, Over Top at top-left) -->
        <line x1="30" y1="84" x2="30" y2="24" stroke="url(#leftGrad)" stroke-width="16"
            stroke-linecap="round" filter="url(#glow)" />

        <!-- 4. Interlock Piece: Top Diagonal re-drawn but clipped to only show its origin cap -->
        <line x1="30" y1="24" x2="78" y2="54" stroke="url(#topGrad)" stroke-width="16"
            stroke-linecap="round" clip-path="url(#interlock)" filter="url(#glow)" />
    </g>
</svg>